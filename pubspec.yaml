name: pharma_local
description: "PharmaLocal — 100% offline pharmacy management system. Zero cloud, zero cost."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # ── Database ─────────────────────────────────────────────
  drift: ^2.26.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.29

  # ── Path / Storage ────────────────────────────────────────
  path_provider: ^2.1.5
  path: ^1.9.1

  # ── State Management & Navigation ────────────────────────
  flutter_riverpod: ^2.6.1
  go_router: ^17.0.0

  # ── Barcode Scanning (Android/iOS only) ──────────────────
  google_mlkit_barcode_scanning: ^0.14.2
  camera: ^0.11.1

  # ── Backup / Archive ─────────────────────────────────────
  archive: ^4.0.9
  encrypt: ^5.0.3

  # ── Sharing & Deep-Link ───────────────────────────────────
  share_plus: ^12.0.2
  url_launcher: ^6.3.1

  # ── Formatting ────────────────────────────────────────────
  intl: ^0.20.2

  # ── UI Utilities ──────────────────────────────────────────
  flutter_slidable: ^4.0.3
  fl_chart: ^0.70.2
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.otf
        - asset: fonts/Inter-Medium.otf
          weight: 500
        - asset: fonts/Inter-SemiBold.otf
          weight: 600
        - asset: fonts/Inter-Bold.otf
          weight: 700
